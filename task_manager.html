<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Manager</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  body {
    background: #111827;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px;
  }

  .container {
    width: 720px;
    background: #1f2937;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.45);
    padding: 35px 40px 40px;
  }

  /* ---------- Header ---------- */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #374151;
    padding-bottom: 20px;
    margin-bottom: 25px;
  }

  .top-bar h1 {
    color: #f9fafb;
    font-size: 30px;
    font-weight: 600;
  }

  .top-bar h1 span {
    color: #2563eb;
  }

  .clock-box {
    text-align: right;
  }

  #clock {
    color: #ffffff;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  #dateDisplay {
    color: #9ca3af;
    font-size: 13px;
    margin-top: 4px;
  }

  /* ---------- Stats ---------- */
  .stats {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
  }

  .stat-card {
    flex: 1;
    background: #111827;
    border: 1px solid #374151;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
  }

  .stat-card .num {
    font-size: 24px;
    font-weight: 700;
    color: #ffffff;
  }

  .stat-card .label {
    font-size: 12px;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .stat-card.total .num { color: #60a5fa; }
  .stat-card.pending .num { color: #fbbf24; }
  .stat-card.done .num { color: #34d399; }

  /* ---------- Progress ---------- */
  .progress-wrap {
    margin-bottom: 30px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    color: #d1d5db;
    font-size: 13px;
    margin-bottom: 8px;
  }

  .progress-bar {
    width: 100%;
    height: 10px;
    background: #111827;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #374151;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2563eb, #34d399);
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 6px;
  }

  /* ---------- Input ---------- */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  #taskInput {
    flex: 1;
    padding: 13px 16px;
    border-radius: 8px;
    border: 1px solid #374151;
    background: #111827;
    color: #f9fafb;
    font-size: 15px;
    outline: none;
  }

  #taskInput:focus {
    border-color: #2563eb;
  }

  select#prioritySelect {
    padding: 0 12px;
    border-radius: 8px;
    border: 1px solid #374151;
    background: #111827;
    color: #f9fafb;
    font-size: 14px;
    outline: none;
  }

  button {
    border: none;
    cursor: pointer;
    font-weight: 600;
    border-radius: 8px;
    transition: 0.25s;
  }

  button:hover {
    transform: translateY(-2px);
  }

  #addBtn {
    background: #2563eb;
    color: white;
    padding: 0 24px;
    font-size: 15px;
  }

  /* ---------- Filters ---------- */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  .filter-btn {
    background: #111827;
    border: 1px solid #374151;
    color: #9ca3af;
    padding: 8px 16px;
    font-size: 13px;
  }

  .filter-btn.active {
    background: #2563eb;
    color: white;
    border-color: #2563eb;
  }

  .clear-btn {
    margin-left: auto;
    background: #4b5563;
    color: white;
    padding: 8px 16px;
    font-size: 13px;
  }

  /* ---------- Task list ---------- */
  #taskList {
    list-style: none;
    max-height: 340px;
    overflow-y: auto;
  }

  #taskList::-webkit-scrollbar {
    width: 6px;
  }
  #taskList::-webkit-scrollbar-thumb {
    background: #374151;
    border-radius: 6px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #111827;
    border: 1px solid #374151;
    border-left: 4px solid #6b7280;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .task-item.high { border-left-color: #dc2626; }
  .task-item.medium { border-left-color: #fbbf24; }
  .task-item.low { border-left-color: #34d399; }

  .task-checkbox {
    width: 20px;
    height: 20px;
    accent-color: #2563eb;
    cursor: pointer;
    flex-shrink: 0;
  }

  .task-text {
    flex: 1;
    color: #e5e7eb;
    font-size: 15px;
    word-break: break-word;
  }

  .task-item.completed .task-text {
    text-decoration: line-through;
    color: #6b7280;
  }

  .task-meta {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 3px;
  }

  .tag {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .tag.high { background: rgba(220,38,38,0.2); color: #f87171; }
  .tag.medium { background: rgba(251,191,36,0.2); color: #fbbf24; }
  .tag.low { background: rgba(52,211,153,0.2); color: #34d399; }

  .delete-btn {
    background: transparent;
    color: #6b7280;
    font-size: 18px;
    padding: 4px 8px;
    flex-shrink: 0;
  }

  .delete-btn:hover {
    color: #dc2626;
    transform: none;
  }

  .empty-msg {
    text-align: center;
    color: #6b7280;
    padding: 30px 0;
    font-size: 14px;
  }

  footer {
    margin-top: 25px;
    text-align: center;
    color: #4b5563;
    font-size: 12px;
    border-top: 1px solid #374151;
    padding-top: 15px;
  }
</style>
</head>
<body>

<div class="container">

  <div class="top-bar">
    <h1>Task<span>Manager</span></h1>
    <div class="clock-box">
      <div id="clock">00:00:00</div>
      <div id="dateDisplay">Loading date...</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card total">
      <div class="num" id="totalCount">0</div>
      <div class="label">Total</div>
    </div>
    <div class="stat-card pending">
      <div class="num" id="pendingCount">0</div>
      <div class="label">Pending</div>
    </div>
    <div class="stat-card done">
      <div class="num" id="doneCount">0</div>
      <div class="label">Completed</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Add a new task..." onkeypress="if(event.key==='Enter') addTask()">
    <select id="prioritySelect">
      <option value="high">High</option>
      <option value="medium" selected>Medium</option>
      <option value="low">Low</option>
    </select>
    <button id="addBtn" onclick="addTask()">Add Task</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
    <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
  </div>

  <ul id="taskList"></ul>

  <footer>Task Manager &mdash; built with HTML, CSS &amp; JavaScript</footer>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tm_tasks") || "[]");
  let currentFilter = "all";

  function saveTasks() {
    localStorage.setItem("tm_tasks", JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const priority = document.getElementById("prioritySelect").value;
    const text = input.value.trim();
    if (text === "") return;

    tasks.push({
      id: Date.now(),
      text: text,
      priority: priority,
      completed: false,
      createdAt: new Date().toLocaleString()
    });

    input.value = "";
    saveTasks();
    render();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
    saveTasks();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    saveTasks();
    render();
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(`.filter-btn[data-filter="${filter}"]`).classList.add("active");
    render();
  }

  function getFilteredTasks() {
    if (currentFilter === "active") return tasks.filter(t => !t.completed);
    if (currentFilter === "completed") return tasks.filter(t => t.completed);
    return tasks;
  }

  function render() {
    const list = document.getElementById("taskList");
    const filtered = getFilteredTasks();
    list.innerHTML = "";

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-msg">No tasks to show</div>';
    } else {
      filtered.forEach(task => {
        const li = document.createElement("li");
        li.className = "task-item " + task.priority + (task.completed ? " completed" : "");
        li.innerHTML = `
          <input type="checkbox" class="task-checkbox" ${task.completed ? "checked" : ""} onchange="toggleTask(${task.id})">
          <div style="flex:1">
            <div class="task-text">${task.text}</div>
            <div class="task-meta">Added: ${task.createdAt}</div>
          </div>
          <span class="tag ${task.priority}">${task.priority}</span>
          <button class="delete-btn" onclick="deleteTask(${task.id})">&times;</button>
        `;
        list.appendChild(li);
      });
    }

    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const pending = total - done;
    const percent = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById("totalCount").textContent = total;
    document.getElementById("doneCount").textContent = done;
    document.getElementById("pendingCount").textContent = pending;
    document.getElementById("progressPercent").textContent = percent + "%";
    document.getElementById("progressFill").style.width = percent + "%";
  }

  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    const ss = String(now.getSeconds()).padStart(2, "0");
    document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;

    const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
    document.getElementById("dateDisplay").textContent = now.toLocaleDateString(undefined, options);
  }

  setInterval(updateClock, 1000);
  updateClock();
  render();
</script>

</body>
</html>
